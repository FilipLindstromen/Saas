<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Saas Apps</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 2rem 1.5rem;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      min-height: 100vh;
      color: #e2e8f0;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(90deg, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      color: #94a3b8;
      margin-bottom: 2.5rem;
      font-size: 1rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
    }
    .card {
      background: rgba(30, 41, 59, 0.8);
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 1px solid rgba(148, 163, 184, 0.1);
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
      border-color: rgba(99, 102, 241, 0.3);
    }
    .card-thumb {
      aspect-ratio: 16 / 10;
      background: #334155;
      overflow: hidden;
      position: relative;
    }
    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .card-body {
      padding: 1rem 1.25rem;
    }
    .card-title {
      font-size: 1rem;
      font-weight: 600;
      margin: 0;
      color: #f1f5f9;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Saas Apps</h1>
    <p class="subtitle">Select an app to get started</p>
    <div class="grid">
      <a href="ColorWriter/" class="card">
        <div class="card-thumb">
          <img src="https://placehold.co/400x250/7c3aed/ffffff?text=Color+Writer" alt="Color Writer" loading="lazy">
        </div>
        <div class="card-body">
          <h2 class="card-title">Color Writer</h2>
        </div>
      </a>
      <a href="InfoGraphics/" class="card">
        <div class="card-thumb">
          <img src="https://placehold.co/400x250/f97316/ffffff?text=Info+Graphics" alt="Info Graphic Generator" loading="lazy">
        </div>
        <div class="card-body">
          <h2 class="card-title">Info Graphic Generator</h2>
        </div>
      </a>
      <a href="conversation-generator/" class="card">
        <div class="card-thumb">
          <img src="https://placehold.co/400x250/0ea5e9/ffffff?text=Conversation" alt="Conversation Generator" loading="lazy">
        </div>
        <div class="card-body">
          <h2 class="card-title">Conversation Generator</h2>
        </div>
      </a>
      <a href="CopyWriter/" class="card">
        <div class="card-thumb">
          <img src="https://placehold.co/400x250/10b981/ffffff?text=CopyWriter" alt="CopyWriter" loading="lazy">
        </div>
        <div class="card-body">
          <h2 class="card-title">CopyWriter</h2>
        </div>
      </a>
      <a href="PitchDeck/" class="card">
        <div class="card-thumb">
          <img src="https://placehold.co/400x250/6366f1/ffffff?text=Pitch+Deck" alt="Pitch Deck" loading="lazy">
        </div>
        <div class="card-body">
          <h2 class="card-title">Pitch Deck</h2>
        </div>
      </a>
      <a href="PostIt/" class="card">
        <div class="card-thumb">
          <img src="https://placehold.co/400x250/eab308/1e293b?text=PostIt" alt="PostIt" loading="lazy">
        </div>
        <div class="card-body">
          <h2 class="card-title">PostIt</h2>
        </div>
      </a>
      <a href="PowerWriter/" class="card">
        <div class="card-thumb">
          <img src="https://placehold.co/400x250/ec4899/ffffff?text=Power+Writer" alt="Power Writer" loading="lazy">
        </div>
        <div class="card-body">
          <h2 class="card-title">Power Writer</h2>
        </div>
      </a>
      <a href="ReelRecorder/" class="card">

          <img src="https://placehold.co/400x250/ef4444/ffffff?text=Reel+Recorder" alt="Reel Recorder" loading="lazy">
        </div>
        <div class="card-body">
          <h2 class="card-title">Reel Recorder</h2>
        </div>
      </a>
      <a href="SoundEffectsGenerator/" class="card">
        <div class="card-thumb">
          <img src="https://placehold.co/400x250/8b5cf6/ffffff?text=Sound+Effects" alt="Sound Effects Generator" loading="lazy">
        </div>
        <div class="card-body">
          <h2 class="card-title">Sound Effects Generator</h2>
        </div>
      </a>
      <a href="StoryWriter/" class="card">
        <div class="card-thumb">
          <img src="https://placehold.co/400x250/14b8a6/ffffff?text=Story+Writer" alt="Story Writer" loading="lazy">
        </div>
        <div class="card-body">
          <h2 class="card-title">Story Writer</h2>
        </div>
      </a>
      <a href="Typography/" class="card">
        <div class="card-thumb">
          <img src="https://placehold.co/400x250/64748b/ffffff?text=Typography" alt="Typography" loading="lazy">
        </div>
        <div class="card-body">
          <h2 class="card-title">Typography</h2>
        </div>
      </a>
      <a href="VIdeoRecorder/" class="card">
        <div class="card-thumb">
          <img src="https://placehold.co/400x250/dc2626/ffffff?text=Video+Recorder" alt="Video Recorder" loading="lazy">
        </div>
        <div class="card-body">
          <h2 class="card-title">Video Recorder</h2>
        </div>
      </a>
      <a href="VSLWriter/" class="card">
        <div class="card-thumb">
          <img src="https://placehold.co/400x250/059669/ffffff?text=VSL+Writer" alt="VSL Writer" loading="lazy">
        </div>
        <div class="card-body">
          <h2 class="card-title">VSL Writer</h2>
        </div>
      </a>
      <a href="webquizgenerator/" class="card">
        <div class="card-thumb">
          <img src="https://placehold.co/400x250/2563eb/ffffff?text=Web+Quiz" alt="Web Quiz Generator" loading="lazy">
        </div>
        <div class="card-body">
          <h2 class="card-title">Web Quiz Generator</h2>

    </div>
  </div>
</body>
</html>
