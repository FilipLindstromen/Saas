<!DOCTYPE html>
<!-- Update the URL below if your Content Generator is deployed elsewhere -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="refresh" content="0;url=https://content-generator.vercel.app">
  <title>Content Generator - Saas Apps</title>
  <style>
    :root { --bg: #0a0a0a; --bg2: #1f1f1f; --text: #fff; --accent: #ff6b35; --border: rgba(255,255,255,0.1); }
    :root[data-theme="light"] { --bg: #f8f9fa; --bg2: #fff; --text: #1a1a1a; --border: rgba(0,0,0,0.08); }
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 2rem; background: var(--bg); color: var(--text); min-height: 100vh; }
    .container { max-width: 560px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin: 0 0 1rem; }
    p { color: var(--text); opacity: 0.9; line-height: 1.6; margin: 0 0 1rem; }
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .btn { display: inline-block; margin-top: 1rem; padding: 0.5rem 1rem; background: var(--accent); color: white; border-radius: 8px; font-weight: 500; }
    .btn:hover { opacity: 0.9; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Content Generator</h1>
    <p>Redirecting to Content Generator…</p>
    <p>If you are not redirected, <a href="https://content-generator.vercel.app" id="app-link">open the app here</a>.</p>
    <a href="../" class="btn">← Back to Saas Apps</a>
  </div>
  <script>window.location.href = document.getElementById('app-link').href;</script>
</body>
</html>
