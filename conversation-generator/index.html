<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversation Animator Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Overlay Menu -->
    <div class="overlay" id="menu-overlay">
        <div class="overlay-content">
            <button class="close-overlay" id="close-overlay">×</button>
            <h2 id="overlay-title">Menu</h2>
            <div id="overlay-body"></div>
        </div>
    </div>
    
    <div class="app-container">
        <!-- Header - matches Typography/InfoGraphics style -->
        <header class="app-header">
            <button type="button" class="header-btn" id="hamburger-btn" aria-label="Menu" title="Menu">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <h1 class="app-title">
                <span class="title-icon">💬</span>
                CONVERSATION ANIMATOR PRO
            </h1>
            <div class="header-project-area">
                <div class="project-selector" id="project-selector">
                    <button type="button" class="project-selector-trigger" id="project-trigger">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M16 13H8M16 17H8M10 9H8"/></svg>
                        <span class="project-selector-name" id="project-name">Untitled</span>
                        <span class="project-chevron">▼</span>
                    </button>
                    <div class="project-selector-dropdown" id="project-dropdown" style="display:none;">
                        <div class="project-selector-list" id="project-list"></div>
                        <button type="button" class="project-selector-new" id="project-new">+ New project</button>
                    </div>
                </div>
                <div class="tab-bar" id="tab-bar">
                    <div class="tab-bar-tabs" id="tab-bar-tabs"></div>
                    <button type="button" class="tab-bar-add" id="tab-add" title="Add conversation">+</button>
                </div>
            </div>
            <div class="header-spacer"></div>
            <button type="button" class="header-btn" id="theme-toggle" aria-label="Toggle theme" title="Toggle theme">
                <span class="theme-icon-svg"></span>
            </button>
            <button type="button" class="header-btn" id="settings-btn" aria-label="Settings" title="Settings">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
        </header>
        
        <div class="main-content">
            <!-- Left Panel - Content -->
            <div class="left-panel">
                <div class="left-settings-panel" id="left-settings-panel">
                    <div class="left-settings-tabs">
                        <button type="button" class="left-settings-tab active" data-tab="profile">Profile</button>
                    </div>
                    <div class="left-settings-content">
                        <div class="left-settings-section" id="section-profile">
                            <div class="form-group">
                                <label>Profile Name</label>
                                <input type="text" id="panel-profile-name" placeholder="My Brain">
                            </div>
                            <div class="form-group">
                                <label>Profile Picture</label>
                                <button type="button" class="btn-secondary" id="panel-profile-picture-btn">Choose File</button>
                            </div>
                            <div class="form-group">
                                <label>Message Count</label>
                                <input type="number" id="panel-message-count" min="0" placeholder="147">
                            </div>
                            <div class="form-group">
                                <label>Time Display</label>
                                <input type="time" id="panel-time-display" value="14:47">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="control-panel">
                    <div class="quick-actions">
                        <button class="action-btn secondary" id="save-load-menu-btn">
                            <span class="btn-icon">💾</span>
                            <span class="btn-text">Export/Import</span>
                        </button>
                    </div>
                    <div class="card">
                        <div class="card-header">
                            <span class="card-icon">✨</span>
                            <h3>Generate with AI</h3>
                        </div>
                        <p class="card-hint">Describe the conversation you want. Requires OpenAI API key in Settings.</p>
                        <textarea id="generate-input" placeholder="e.g. A customer asking about a refund, and a support agent helping them resolve it. 6-8 messages." rows="3"></textarea>
                        <button class="btn-primary" id="generate-btn">
                            <span>✨</span> Generate Conversation
                        </button>
                    </div>
                    <div class="card">
                        <div class="card-header">
                            <span class="card-icon">📝</span>
                            <h3>Import Conversation</h3>
                        </div>
                        <textarea id="import-text" placeholder="Paste your conversation here...&#10;Format: Me: message / Name: message"></textarea>
                        <button class="btn-primary" id="import-btn">
                            <span>📥</span> Import
                        </button>
                    </div>
                    <div class="card">
                        <div class="card-header">
                            <span class="card-icon">💬</span>
                            <h3>Messages</h3>
                        </div>
                        <div id="messages-script"></div>
                        <button class="btn-primary" id="add-message-btn">
                            <span>➕</span> Add Message
                        </button>
                    </div>
                </div>
            </div>

            <!-- Middle Panel - Preview -->
            <div class="preview-panel">
                <div class="preview-container">
                    <div class="phone-wrapper">
                        <div class="phone-screen" id="phone-screen">
                            <div class="status-bar">
                                <span class="time">14:47</span>
                                <div class="status-icons">
                                    <span class="signal">●●●●</span>
                                    <span class="wifi">📶</span>
                                    <span class="battery">🔋</span>
                                </div>
                            </div>
                            <div class="chat-header">
                                <div class="back-button">‹ <span class="back-count">147</span></div>
                                <div class="profile-info">
                                    <img id="header-profile-pic" src="" alt="" class="profile-pic">
                                    <div class="profile-name" id="header-profile-name">My Brain</div>
                                </div>
                            </div>
                            <div class="chat-background" id="chat-background">
                                <video id="bg-video-element" loop muted style="display: none;"></video>
                            </div>
                            <div class="chat-messages" id="chat-messages"></div>
                            <div class="imessage-input-bar">
                                <span class="input-icon">+</span>
                                <div class="imessage-input" id="imessage-input"></div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="preview-actions">
                        <button class="btn-large btn-preview" id="preview-btn">
                            <span>▶️</span> Preview Animation
                        </button>
                        <button class="btn-large btn-export" id="export-btn">
                            <span>📹</span> Export Video
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Panel - Settings -->
            <aside class="right-inspector-panel">
                <div class="inspector-panel-header">
                    <h3 class="inspector-panel-title">Timing</h3>
                </div>
                <div class="inspector-panel-content">
                    <div class="slider-group">
                        <label>
                            <span>Sender Delay</span>
                            <span class="slider-value" id="sender-delay-value">1000ms</span>
                        </label>
                        <input type="range" id="sender-delay" min="100" max="5000" step="100" value="1000">
                    </div>
                    <div class="slider-group">
                        <label>
                            <span>Receiver Delay</span>
                            <span class="slider-value" id="receiver-delay-value">1500ms</span>
                        </label>
                        <input type="range" id="receiver-delay" min="100" max="5000" step="100" value="1500">
                    </div>
                    <div class="slider-group">
                        <label>
                            <span>Base Typing Time</span>
                            <span class="slider-value" id="typing-delay-value">500ms</span>
                        </label>
                        <input type="range" id="typing-delay" min="100" max="2000" step="100" value="500">
                    </div>
                    <div class="slider-group">
                        <label>
                            <span>Time per Character</span>
                            <span class="slider-value" id="typing-per-char-value">30ms</span>
                        </label>
                        <input type="range" id="typing-per-char" min="0" max="100" step="5" value="30">
                    </div>
                    <div class="slider-group">
                        <label>
                            <span>Typing Speed</span>
                            <span class="slider-value" id="typing-speed-value">50ms</span>
                        </label>
                        <input type="range" id="typing-speed" min="10" max="200" step="10" value="50">
                    </div>
                </div>
                <div class="inspector-panel-header">
                    <h3 class="inspector-panel-title" style="--inspector-icon: '🎨';">Background</h3>
                </div>
                <div class="inspector-panel-content">
                    <div class="form-group">
                        <label>Type</label>
                        <select id="bg-type">
                            <option value="color">Color</option>
                            <option value="image">Image</option>
                            <option value="video">Video</option>
                        </select>
                    </div>
                    <div class="form-group" id="bg-color-group">
                        <label>Color</label>
                        <input type="color" id="bg-color" value="#000000">
                    </div>
                    <div class="form-group" id="bg-image-group" style="display: none;">
                        <label>Image</label>
                        <input type="file" id="bg-image" accept="image/*">
                    </div>
                    <div class="form-group" id="bg-video-group" style="display: none;">
                        <label>Video</label>
                        <input type="file" id="bg-video" accept="video/*">
                    </div>
                    <div class="form-group">
                        <label>Background Music</label>
                        <input type="file" id="bg-music" accept="audio/*">
                    </div>
                </div>
                <div class="inspector-panel-header">
                    <h3 class="inspector-panel-title" style="--inspector-icon: '🔊';">Sound Effects</h3>
                </div>
                <div class="inspector-panel-content">
                    <div class="form-group checkbox-group">
                        <label>
                            <input type="checkbox" id="sound-effects" checked>
                            <span>Enable Sound Effects</span>
                        </label>
                    </div>
                    <div class="slider-group">
                        <label>
                            <span>Typing</span>
                            <span class="slider-value" id="typing-volume-value">50%</span>
                        </label>
                        <input type="range" id="typing-volume" min="0" max="100" step="5" value="50">
                    </div>
                    <div class="slider-group">
                        <label>
                            <span>Send</span>
                            <span class="slider-value" id="send-volume-value">50%</span>
                        </label>
                        <input type="range" id="send-volume" min="0" max="100" step="5" value="50">
                    </div>
                    <div class="slider-group">
                        <label>
                            <span>Receive</span>
                            <span class="slider-value" id="receive-volume-value">50%</span>
                        </label>
                        <input type="range" id="receive-volume" min="0" max="100" step="5" value="50">
                    </div>
                </div>
            </aside>
        </div>
    </div>
    
    <!-- Hidden elements -->
    <input type="text" id="profile-name" value="My Brain" style="display:none;">
    <input type="file" id="profile-picture" accept="image/*" style="display:none;">
    <input type="number" id="message-count" value="147" style="display:none;">
    <input type="text" id="save-name" style="display:none;">
    <select id="saved-conversations" style="display:none;"></select>
    
    <audio id="bg-music-element" loop style="display: none;"></audio>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.0.0-rc.5/dist/html2canvas.min.js"></script>
    <script src="apiKeys.js"></script>
    <script src="projectStorage.js"></script>
    <script src="script.js"></script>
</body>
</html>
