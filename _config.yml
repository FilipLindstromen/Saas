# GitHub Pages / Jekyll configuration
# For project sites: https://username.github.io/Saas/
title: Saas Apps
description: Collection of SaaS applications and tools

# Required for GitHub Pages project sites (replace 'Saas' with your repo name if different)
baseurl: "/Saas"
url: ""

# Markdown processor
markdown: kramdown

# Exclude from Jekyll processing
# App directories contain node_modules and source - exclude to avoid slow builds/timeouts
exclude:
  - node_modules
  - vendor
  - Gemfile
  - Gemfile.lock
  - package.json
  - package-lock.json
  - yarn.lock
  - pnpm-lock.yaml
  - "**/node_modules/**"
  - "**/.git/**"
  - webquizgenerator
  - CopyWriter
  - StoryWriter
  - ColorWriter
  - PostIt
  - PitchDeck
  - VIdeoRecorder
  - SoundEffectsGenerator
  - Typography
  - VSLWriter
  - PowerWriter
  - ReelRecorder
  - InfoGraphics
  - Quiz
  - conversation-generator
  - "conversation-generator - Copy"
  - "quiz-generator - Copy"
  - VoideDepth